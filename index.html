<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luhamus</title>
  <link rel="stylesheet" href="/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Just+Another+Hand&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header class="banner">
      <span>Luhamus</span>
    </header>

    <nav id="nav"></nav>

    <main>
      <div class="title-row">
        <h1 class="handwrite">Hello and welcome!</h1>
        <span class="click-hint">Click me!</span>
      </div>
      <p>My name is <strong>Rasmus Luha</strong>.<br>I am (graduated but nevertheless still) studying Computer Science with a focus on DevOps.</p>
    </main>

    <div class="widget-row">
      <div class="widget-card">
        <canvas id="clock" width="180" height="180"></canvas>
      </div>
      <div class="widget-card">
        <div id="terminal-box">
          <p class="t-line"><span class="t-prompt">rasmus@luhamus:~$ </span><span id="t-cmd" class="t-cmd"></span><span class="cursor"></span></p>
          <div id="t-output"></div>
        </div>
      </div>
    </div>

  </div>
  <footer id="footer"></footer>
  <script src="/script.js"></script>
</body>
</html>
